<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0052a3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00a3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Main Icon - Interconnected nodes representing cloud/network -->
  <g id="cloud-network">
    <!-- Central Node -->
    <circle cx="50" cy="50" r="8" fill="url(#grad2)" stroke="url(#grad1)" stroke-width="1.5"/>
    
    <!-- Top Node -->
    <circle cx="50" cy="25" r="6" fill="url(#grad2)" stroke="url(#grad1)" stroke-width="1.5"/>
    
    <!-- Bottom Node -->
    <circle cx="50" cy="75" r="6" fill="url(#grad2)" stroke="url(#grad1)" stroke-width="1.5"/>
    
    <!-- Left Node -->
    <circle cx="28" cy="50" r="6" fill="url(#grad2)" stroke="url(#grad1)" stroke-width="1.5"/>
    
    <!-- Right Node -->
    <circle cx="72" cy="50" r="6" fill="url(#grad2)" stroke="url(#grad1)" stroke-width="1.5"/>
    
    <!-- Top-Left Node -->
    <circle cx="35" cy="32" r="5" fill="url(#grad2)" opacity="0.7" stroke="url(#grad1)" stroke-width="1"/>
    
    <!-- Top-Right Node -->
    <circle cx="65" cy="32" r="5" fill="url(#grad2)" opacity="0.7" stroke="url(#grad1)" stroke-width="1"/>
    
    <!-- Bottom-Left Node -->
    <circle cx="35" cy="68" r="5" fill="url(#grad2)" opacity="0.7" stroke="url(#grad1)" stroke-width="1"/>
    
    <!-- Bottom-Right Node -->
    <circle cx="65" cy="68" r="5" fill="url(#grad2)" opacity="0.7" stroke="url(#grad1)" stroke-width="1"/>
  </g>
  
  <!-- Connection Lines -->
  <g id="connections" stroke="url(#grad1)" stroke-width="1.5" opacity="0.6" stroke-linecap="round">
    <!-- Main connections -->
    <line x1="50" y1="25" x2="50" y2="42" />
    <line x1="50" y1="58" x2="50" y2="75" />
    <line x1="28" y1="50" x2="42" y2="50" />
    <line x1="58" y1="50" x2="72" y2="50" />
    
    <!-- Diagonal connections -->
    <line x1="43" y1="35" x2="35" y2="32" />
    <line x1="57" y1="35" x2="65" y2="32" />
    <line x1="43" y1="65" x2="35" y2="68" />
    <line x1="57" y1="65" x2="65" y2="68" />
  </g>
  
  <!-- Outer decorative circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
</svg>